<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primal Pantry — Sales Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.min.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b; --blue: #3b82f6; --green: #4ade80; --purple: #8b5cf6; --pink: #ec4899; --amber: #f59e0b; --cyan: #06b6d4; --red: #f43f5e; --lime: #84cc16; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #login-box { background: var(--card); padding: 2.5rem; border-radius: 12px; width: 360px; }
    #login-box h1 { font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center; }
    #login-box input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 1rem; margin-bottom: 1rem; }
    #login-box button { width: 100%; padding: 0.75rem; border: none; border-radius: 8px; background: var(--blue); color: white; font-size: 1rem; cursor: pointer; font-weight: 600; }
    #login-box button:hover { background: #2563eb; }
    #login-error { color: var(--red); font-size: 0.875rem; text-align: center; margin-top: 0.5rem; display: none; }

    /* Dashboard */
    #dashboard { display: none; padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header-controls { display: flex; gap: 0.5rem; align-items: center; }
    .header-controls button, .header-controls select { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 0.5rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .header-controls button:hover, .header-controls select:hover { border-color: var(--blue); color: var(--text); }
    .header-controls button.active { background: var(--blue); color: white; border-color: var(--blue); }
    .header-controls input[type="date"] { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.5rem; border-radius: 6px; font-size: 0.8rem; }

    /* Stats grid */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--card); border-radius: 10px; padding: 1rem; cursor: pointer; transition: border 0.2s; border: 1px solid transparent; }
    .stat-card:hover { border-color: var(--blue); }
    .stat-card .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.2rem; }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; }
    .stat-card .sub { font-size: 0.75rem; color: var(--dim); margin-top: 0.15rem; }

    /* Section */
    .section { margin-bottom: 1.5rem; }
    .section-title { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
    .chart-card { background: var(--card); border-radius: 10px; padding: 1rem; }
    .chart-card h3 { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em; }

    /* Heatmap */
    .heatmap-grid { display: grid; grid-template-columns: 40px repeat(24, 1fr); gap: 2px; font-size: 0.65rem; }
    .heatmap-label { display: flex; align-items: center; color: var(--dim); }
    .heatmap-cell { aspect-ratio: 1; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: rgba(255,255,255,0.6); }
    .heatmap-header { color: var(--dim); text-align: center; font-size: 0.6rem; padding: 2px 0; }

    /* UTM table */
    .utm-table { width: 100%; border-collapse: collapse; }
    .utm-table th { text-align: left; padding: 0.4rem 0.5rem; font-size: 0.7rem; color: var(--dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    .utm-table td { padding: 0.4rem 0.5rem; font-size: 0.8rem; border-bottom: 1px solid #111827; }
    .utm-bar { height: 6px; border-radius: 3px; background: var(--blue); display: inline-block; }

    /* Map */
    #order-map { height: 400px; border-radius: 8px; z-index: 1; position: relative; }

    /* Orders table */
    .orders-card { background: var(--card); border-radius: 10px; padding: 1rem; }
    .orders-card h3 { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem; text-transform: uppercase; }
    .search-bar { width: 100%; padding: 0.6rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.875rem; margin-bottom: 0.75rem; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.5rem 0.6rem; font-size: 0.7rem; color: var(--dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 0.55rem 0.6rem; font-size: 0.8rem; border-bottom: 1px solid #111827; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover td { background: var(--border); }
    .status-badge { padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.7rem; background: #166534; color: var(--green); }

    /* Order detail modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 12px; padding: 1.5rem; max-width: 550px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h2 { font-size: 1.1rem; margin-bottom: 1rem; }
    .modal-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #111827; font-size: 0.85rem; }
    .modal-row .label { color: var(--muted); }
    .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 1.25rem; cursor: pointer; }

    .loading { text-align: center; padding: 2rem; color: var(--dim); }

    @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

<div id="login-screen">
  <div id="login-box">
    <h1>Primal Pantry Dashboard</h1>
    <input type="password" id="password-input" placeholder="Enter password" autofocus>
    <button id="login-btn">Sign in</button>
    <div id="login-error">Incorrect password</div>
  </div>
</div>

<div id="dashboard">
  <div class="header">
    <h1>Sales Dashboard</h1>
    <div class="header-controls">
      <select id="date-range">
        <option value="today" selected>Today</option>
        <option value="yesterday">Yesterday</option>
        <option value="7d">Last 7 Days</option>
        <option value="30d">Last 30 Days</option>
        <option value="month">This Month</option>
        <option value="all">All Time</option>
        <option value="custom">Custom Range</option>
      </select>
      <input type="date" id="date-from" title="From" style="display:none;">
      <input type="date" id="date-to" title="To" style="display:none;">
      <select id="filter-utm"><option value="">All Sources</option></select>
      <select id="filter-city"><option value="">All Cities</option></select>
      <button id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="stats" id="stats-grid"></div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Revenue</h3>
      <canvas id="revenue-chart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Orders by Hour</h3>
      <canvas id="hours-chart"></canvas>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Top Products <select id="product-view" style="float:right;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:0.75rem;"><option value="name">By Name</option><option value="sku">By SKU</option></select></h3>
      <canvas id="products-chart"></canvas>
    </div>
    <div class="chart-card">
      <h3>UTM Sources</h3>
      <div id="utm-container"></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Order Heatmap (Day x Hour)</h3>
      <div id="heatmap-container"></div>
    </div>
    <div class="chart-card">
      <h3>Order Locations</h3>
      <div id="order-map"></div>
    </div>
  </div>

  <div class="chart-card" style="margin-bottom:1.5rem;">
    <h3>Magnet Products (Most Common First Item in Cart)</h3>
    <div id="magnet-container"></div>
  </div>

  <div class="orders-card">
    <h3>Orders</h3>
    <input type="text" class="search-bar" id="order-search" placeholder="Search by name, email, or product...">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Customer</th>
          <th>Email</th>
          <th>Location</th>
          <th>Total</th>
          <th>Source</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="orders-table">
        <tr><td colspan="7" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Order detail modal -->
<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">&times;</button>
    <h2 id="modal-title">Order Details</h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://yufthilajhcaedudaxkm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_4qo2PFoiZ0d0ip0Yf3TQFg_Cmc-kSuv';
const VALID_PASSWORD = 'MoreSales01!';

let sb, allOrders = [], allLineItems = [], filteredOrders = [], charts = {};

// ── Auth ──
document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('logout-btn').addEventListener('click', () => { sessionStorage.removeItem('pp_auth'); location.reload(); });
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('order-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('order-search').addEventListener('input', renderOrdersTable);
document.getElementById('product-view').addEventListener('change', () => renderProductsChart(currentLineItems));

function login() {
  if (document.getElementById('password-input').value === VALID_PASSWORD) {
    sessionStorage.setItem('pp_auth', '1');
    showDashboard();
  } else {
    const el = document.getElementById('login-error');
    el.textContent = 'Incorrect password';
    el.style.display = 'block';
  }
}

if (sessionStorage.getItem('pp_auth') === '1') showDashboard();

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  initDashboard();
}

// ── Filtering ──
let currentRange = 'today';

// Date range dropdown
document.getElementById('date-range').addEventListener('change', function() {
  currentRange = this.value;
  const custom = currentRange === 'custom';
  document.getElementById('date-from').style.display = custom ? '' : 'none';
  document.getElementById('date-to').style.display = custom ? '' : 'none';
  applyFilter();
});
document.getElementById('date-from').addEventListener('change', applyFilter);
document.getElementById('date-to').addEventListener('change', applyFilter);
document.getElementById('filter-utm').addEventListener('change', applyFilter);
document.getElementById('filter-city').addEventListener('change', applyFilter);

function getDateRange() {
  const now = new Date();
  const today = fmt_date(now);
  const yesterday = fmt_date(new Date(now - 86400000));

  switch (currentRange) {
    case 'today': return [today, today];
    case 'yesterday': return [yesterday, yesterday];
    case '7d': return [fmt_date(new Date(now - 7 * 86400000)), today];
    case '30d': return [fmt_date(new Date(now - 30 * 86400000)), today];
    case 'month': return [`${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`, today];
    case 'all': return ['2000-01-01', today];
    case 'custom': {
      const from = document.getElementById('date-from').value || '2000-01-01';
      const to = document.getElementById('date-to').value || today;
      return [from, to];
    }
    default: return [today, today];
  }
}

function populateFilterDropdowns() {
  // UTM sources
  const utmSelect = document.getElementById('filter-utm');
  const sources = [...new Set(allOrders.map(o => o.utm_source || getUtmFromUrl(o.thank_you_url) || '').filter(Boolean))].sort();
  utmSelect.innerHTML = '<option value="">All Sources</option>' + sources.map(s => `<option value="${s}">${s}</option>`).join('');

  // Cities
  const citySelect = document.getElementById('filter-city');
  const cities = [...new Set(allOrders.map(o => o.city || '').filter(Boolean))].sort();
  citySelect.innerHTML = '<option value="">All Cities</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join('');
}

function applyFilter() {
  const [from, to] = getDateRange();
  const utmFilter = document.getElementById('filter-utm').value;
  const cityFilter = document.getElementById('filter-city').value;

  filteredOrders = allOrders.filter(o => {
    if (o.order_date < from || o.order_date > to) return false;
    if (utmFilter && (o.utm_source || getUtmFromUrl(o.thank_you_url) || '') !== utmFilter) return false;
    if (cityFilter && o.city !== cityFilter) return false;
    return true;
  });

  const filteredOrderIds = new Set(filteredOrders.map(o => o.id));
  const filteredLI = allLineItems.filter(li => filteredOrderIds.has(li.order_id));
  renderAll(filteredOrders, filteredLI);
}

// ── Init ──
async function initDashboard() {
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (err) {
    document.getElementById('orders-table').innerHTML = `<tr><td colspan="7">Supabase error: ${err.message}</td></tr>`;
    return;
  }

  const [ordersRes, liRes] = await Promise.all([
    sb.from('orders').select('*').order('created_at', { ascending: false }),
    sb.from('order_line_items').select('*'),
  ]);

  if (ordersRes.error) {
    document.getElementById('orders-table').innerHTML = `<tr><td colspan="7">DB error: ${ordersRes.error.message}</td></tr>`;
    return;
  }

  allOrders = ordersRes.data || [];
  allLineItems = liRes.data || [];
  populateFilterDropdowns();
  applyFilter();
}

// ── Render all ──
function renderAll(orders, lineItems) {
  renderStats(orders, lineItems);
  renderRevenueChart(orders);
  renderHoursChart(orders);
  renderProductsChart(lineItems);
  renderUTM(orders);
  renderHeatmap(orders);
  renderMap(orders);
  renderMagnetProducts(orders);
  renderOrdersTable();
}

// ── Stats ──
function renderStats(orders, lineItems) {
  const revenue = sum(orders, 'total_value');
  const orderCount = orders.length;
  const aov = orderCount > 0 ? revenue / orderCount : 0;

  // Repeat customers
  const emailCounts = {};
  allOrders.forEach(o => { if (o.email) emailCounts[o.email] = (emailCounts[o.email] || 0) + 1; });
  const repeatCustomers = Object.values(emailCounts).filter(c => c > 1).length;
  const totalCustomers = Object.keys(emailCounts).length;

  // CLV = total revenue / unique customers
  const allRevenue = sum(allOrders, 'total_value');
  const clv = totalCustomers > 0 ? allRevenue / totalCustomers : 0;

  // Avg jars per order (using line item quantities)
  const totalQty = lineItems.reduce((s, li) => s + (li.quantity || 0), 0);
  const avgJars = orderCount > 0 ? totalQty / orderCount : 0;

  // Unique emails in filtered period
  const periodEmails = new Set(orders.map(o => o.email).filter(Boolean));

  const stats = [
    { label: 'Revenue', value: fmt_money(revenue), sub: `${orderCount} orders`, color: 'var(--green)' },
    { label: 'Orders', value: orderCount, sub: `${periodEmails.size} customers`, color: 'var(--blue)' },
    { label: 'AOV', value: fmt_money(aov), sub: 'avg order value', color: 'var(--purple)' },
    { label: 'Repeat Customers', value: repeatCustomers, sub: `of ${totalCustomers} total`, color: 'var(--amber)' },
    { label: 'CLV', value: fmt_money(clv), sub: 'lifetime value', color: 'var(--cyan)' },
    { label: 'Avg Items/Order', value: avgJars.toFixed(1), sub: 'line items', color: 'var(--pink)' },
    { label: 'Avg Shipping', value: fmt_money(orderCount > 0 ? sum(orders, 'shipping_cost') / orderCount : 0), sub: 'per order', color: 'var(--dim)' },
    { label: 'Discounts Given', value: fmt_money(sum(orders, 'discount_applied')), sub: `${orders.filter(o => Number(o.discount_applied) > 0).length} orders`, color: 'var(--red)' },
    { label: 'Top Customer (Spend)', value: topCustomer(allOrders, 'total_value').name, sub: fmt_money(topCustomer(allOrders, 'total_value').total), color: 'var(--lime)' },
    { label: 'Top Customer (Orders)', value: topCustomer(allOrders, 'count').name, sub: `${topCustomer(allOrders, 'count').total} orders`, color: 'var(--amber)' },
  ];

  document.getElementById('stats-grid').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="label">${s.label}</div>
      <div class="value" style="color:${s.color}">${s.value}</div>
      <div class="sub">${s.sub}</div>
    </div>
  `).join('');
}

// ── Revenue chart ──
function renderRevenueChart(orders) {
  const [from, to] = getDateRange();
  const days = {};
  const start = new Date(from + 'T00:00:00');
  const end = new Date(to + 'T00:00:00');
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    days[fmt_date(d)] = 0;
  }
  orders.forEach(o => { if (days[o.order_date] !== undefined) days[o.order_date] += Number(o.total_value || 0); });

  const labels = Object.keys(days).map(d => {
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getDate()}/${dt.getMonth() + 1}`;
  });

  if (charts.revenue) charts.revenue.destroy();
  charts.revenue = new Chart(document.getElementById('revenue-chart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Revenue', data: Object.values(days), backgroundColor: 'var(--blue)', borderRadius: 3 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: {
      y: { ticks: { color: '#64748b', callback: v => '$' + v }, grid: { color: '#111827' } },
      x: { ticks: { color: '#64748b', maxRotation: 45, maxTicksLimit: 15 }, grid: { display: false } },
    }},
  });
}

// ── Orders by hour ──
function renderHoursChart(orders) {
  const hours = Array(24).fill(0);
  orders.forEach(o => {
    let h = o.order_hour;
    if (h == null && o.created_at) h = new Date(o.created_at).getHours();
    if (h != null && h >= 0 && h < 24) hours[h]++;
  });

  const labels = hours.map((_, i) => `${i}:00`);

  if (charts.hours) charts.hours.destroy();
  charts.hours = new Chart(document.getElementById('hours-chart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Orders', data: hours, backgroundColor: 'var(--purple)', borderRadius: 3 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: {
      y: { ticks: { color: '#64748b' }, grid: { color: '#111827' } },
      x: { ticks: { color: '#64748b', maxRotation: 45 }, grid: { display: false } },
    }},
  });
}

// ── Top products ──
let currentLineItems = [];
function renderProductsChart(lineItems) {
  currentLineItems = lineItems;
  const view = document.getElementById('product-view').value;
  const products = {};
  lineItems.forEach(li => {
    const key = view === 'sku' ? (li.sku || 'Unknown') : (li.description || li.sku || 'Unknown');
    products[key] = (products[key] || 0) + li.quantity;
  });

  const sorted = Object.entries(products).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#06b6d4', '#f43f5e', '#84cc16', '#a78bfa', '#fb923c'];

  if (charts.products) charts.products.destroy();
  charts.products = new Chart(document.getElementById('products-chart'), {
    type: 'doughnut',
    data: { labels: sorted.map(s => s[0]), datasets: [{ data: sorted.map(s => s[1]), backgroundColor: colors.slice(0, sorted.length) }] },
    options: { responsive: true, plugins: { legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 11 }, padding: 6, boxWidth: 12 } } } },
  });
}

// ── UTM Sources ──
function renderUTM(orders) {
  const sources = {};
  orders.forEach(o => {
    const src = o.utm_source || (o.thank_you_url && getUtmFromUrl(o.thank_you_url)) || 'Direct';
    sources[src] = (sources[src] || 0) + 1;
  });

  const sorted = Object.entries(sources).sort((a, b) => b[1] - a[1]);
  const max = sorted.length > 0 ? sorted[0][1] : 1;
  const container = document.getElementById('utm-container');

  if (sorted.length === 0 || (sorted.length === 1 && sorted[0][0] === 'Direct')) {
    container.innerHTML = '<p style="color:var(--dim);font-size:0.85rem;">No UTM data yet. UTM params from thank-you URLs will appear here.</p>';
    return;
  }

  container.innerHTML = `<table class="utm-table">
    <thead><tr><th>Source</th><th>Orders</th><th></th></tr></thead>
    <tbody>${sorted.map(([src, count]) => `
      <tr>
        <td>${src}</td>
        <td>${count}</td>
        <td><span class="utm-bar" style="width:${(count / max) * 100}px"></span></td>
      </tr>
    `).join('')}</tbody>
  </table>`;
}

function getUtmFromUrl(url) {
  try { return new URL(url).searchParams.get('utm_source') || ''; } catch { return ''; }
}

// ── Heatmap (Day of week x Hour) ──
function renderHeatmap(orders) {
  const grid = Array(7).fill(null).map(() => Array(24).fill(0));
  orders.forEach(o => {
    const dow = new Date(o.order_date + 'T00:00:00').getDay();
    const h = o.order_hour != null ? o.order_hour : new Date(o.created_at).getHours();
    grid[dow][h]++;
  });

  const max = Math.max(1, ...grid.flat());
  const dayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const container = document.getElementById('heatmap-container');

  let html = '<div class="heatmap-grid">';
  // Header row
  html += '<div></div>';
  for (let h = 0; h < 24; h++) html += `<div class="heatmap-header">${h}</div>`;

  for (let d = 0; d < 7; d++) {
    html += `<div class="heatmap-label">${dayLabels[d]}</div>`;
    for (let h = 0; h < 24; h++) {
      const v = grid[d][h];
      const intensity = v / max;
      const bg = v === 0 ? 'rgba(255,255,255,0.03)' : `rgba(59,130,246,${0.15 + intensity * 0.85})`;
      html += `<div class="heatmap-cell" style="background:${bg}" title="${dayLabels[d]} ${h}:00 — ${v} orders">${v || ''}</div>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;
}

// ── Orders table ──
function renderOrdersTable() {
  const tbody = document.getElementById('orders-table');
  const query = (document.getElementById('order-search').value || '').toLowerCase();

  let orders = filteredOrders;
  if (query) {
    // Get line item descriptions for search
    const orderLineItemMap = {};
    allLineItems.forEach(li => {
      if (!orderLineItemMap[li.order_id]) orderLineItemMap[li.order_id] = [];
      orderLineItemMap[li.order_id].push(li);
    });

    orders = orders.filter(o => {
      const fields = [o.customer_name, o.email, o.city, o.utm_source, o.status].join(' ').toLowerCase();
      const liText = (orderLineItemMap[o.id] || []).map(li => `${li.description} ${li.sku}`).join(' ').toLowerCase();
      return fields.includes(query) || liText.includes(query);
    });
  }

  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="loading">No orders found</td></tr>';
    return;
  }

  tbody.innerHTML = orders.slice(0, 100).map(o => `
    <tr class="clickable" data-id="${o.id}">
      <td>${o.order_date}</td>
      <td>${o.customer_name || '-'}</td>
      <td>${o.email || '-'}</td>
      <td>${[o.city, o.country_code].filter(Boolean).join(', ') || '-'}</td>
      <td>$${Number(o.total_value || 0).toFixed(2)}</td>
      <td>${o.utm_source || '-'}</td>
      <td><span class="status-badge">${o.status || '-'}</span></td>
    </tr>
  `).join('');

  // Attach click handlers
  tbody.querySelectorAll('tr.clickable').forEach(tr => {
    tr.addEventListener('click', () => openOrderModal(Number(tr.dataset.id)));
  });
}

// ── Order modal ──
function openOrderModal(orderId) {
  const order = allOrders.find(o => o.id === orderId);
  if (!order) return;

  const items = allLineItems.filter(li => li.order_id === orderId);

  document.getElementById('modal-title').textContent = `Order — ${order.customer_name || order.email}`;

  const statusOptions = ['Ordered - Paid', 'Processing', 'Shipped', 'Delivered', 'Refunded', 'Incorrect Order', 'Cancelled'];
  const statusSelect = `<select id="modal-status" data-order-id="${orderId}" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:0.85rem;">
    ${statusOptions.map(s => `<option value="${s}" ${s === order.status ? 'selected' : ''}>${s}</option>`).join('')}
  </select>`;

  const rows = [
    ['Date', order.order_date],
    ['Email', order.email],
    ['Phone', order.phone || '-'],
    ['Status', statusSelect],
    ['Total', '$' + Number(order.total_value || 0).toFixed(2)],
    ['Shipping Cost', '$' + Number(order.shipping_cost || 0).toFixed(2)],
    ['Discount', '$' + Number(order.discount_applied || 0).toFixed(2)],
    ['Currency', order.currency],
    ['Market', order.market],
    ['Address', [order.street_address, order.suburb, order.city, order.postcode, order.country_code].filter(Boolean).join(', ')],
    ['UTM Source', order.utm_source || '-'],
    ['UTM Medium', order.utm_medium || '-'],
    ['UTM Campaign', order.utm_campaign || '-'],
    ['Stripe ID', order.stripe_session_id],
  ];

  let html = rows.map(([l, v]) => `<div class="modal-row"><span class="label">${l}</span><span>${v || '-'}</span></div>`).join('');

  if (items.length > 0) {
    html += '<h3 style="margin:1rem 0 0.5rem;font-size:0.9rem;color:var(--muted)">Line Items</h3>';
    html += items.map(li => `
      <div class="modal-row">
        <span>${li.quantity}x ${li.description || li.sku || 'Unknown'}</span>
        <span>$${Number(li.unit_price || 0).toFixed(2)}</span>
      </div>
    `).join('');
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('order-modal').classList.add('open');

  // Status change handler
  document.getElementById('modal-status').addEventListener('change', async function() {
    const newStatus = this.value;
    const oid = Number(this.dataset.orderId);
    const { error } = await sb.from('orders').update({ status: newStatus }).eq('id', oid);
    if (error) {
      alert('Failed to update status: ' + error.message);
    } else {
      const order = allOrders.find(o => o.id === oid);
      if (order) order.status = newStatus;
      renderOrdersTable();
    }
  });
}

function closeModal() {
  document.getElementById('order-modal').classList.remove('open');
}

// ── Helpers ──
// ── Magnet Products ──
function renderMagnetProducts(orders) {
  const firstItems = {};
  const totalOrders = orders.length;
  orders.forEach(o => {
    const items = allLineItems.filter(li => li.order_id === o.id).sort((a, b) => a.id - b.id);
    if (items.length > 0) {
      const name = items[0].description || items[0].sku || 'Unknown';
      if (!firstItems[name]) firstItems[name] = { count: 0, revenue: 0 };
      firstItems[name].count++;
      firstItems[name].revenue += Number(o.total_value || 0);
    }
  });
  const sorted = Object.entries(firstItems).sort((a, b) => b[1].count - a[1].count);
  const max = sorted.length > 0 ? sorted[0][1].count : 1;
  const container = document.getElementById('magnet-container');

  if (sorted.length === 0) {
    container.innerHTML = '<p style="color:var(--dim);font-size:0.85rem;">No data yet</p>';
    return;
  }

  container.innerHTML = `<table class="utm-table">
    <thead><tr><th>Product</th><th>Orders</th><th>Revenue</th><th>% of Orders</th><th></th></tr></thead>
    <tbody>${sorted.map(([name, data]) => `
      <tr>
        <td>${name}</td>
        <td>${data.count}</td>
        <td>${fmt_money(data.revenue)}</td>
        <td>${totalOrders > 0 ? (data.count / totalOrders * 100).toFixed(1) : 0}%</td>
        <td><span class="utm-bar" style="width:${(data.count / max) * 120}px;background:var(--cyan);"></span></td>
      </tr>
    `).join('')}</tbody>
  </table>`;
}

let mapInstance = null;
let heatLayer = null;

function renderMap(orders) {
  const container = document.getElementById('order-map');

  // Count orders per city and get coordinates
  const cityOrders = {};
  orders.forEach(o => {
    const city = (o.city || '').toLowerCase().trim();
    if (!city) return;
    if (!cityOrders[city]) cityOrders[city] = { count: 0, revenue: 0, name: o.city };
    cityOrders[city].count++;
    cityOrders[city].revenue += Number(o.total_value || 0);
  });

  // Build heat data points
  const heatData = [];
  const markers = [];
  Object.entries(cityOrders).forEach(([city, data]) => {
    const coords = NZ_CITIES[city];
    if (!coords) return;
    // Add multiple points for intensity
    for (let i = 0; i < data.count; i++) {
      heatData.push([coords[0], coords[1], 1]);
    }
    markers.push({ coords, ...data });
  });

  if (!mapInstance) {
    mapInstance = L.map('order-map', { scrollWheelZoom: false }).setView([-41.0, 174.0], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '',
      maxZoom: 18,
    }).addTo(mapInstance);
  }

  // Remove old heat layer
  if (heatLayer) mapInstance.removeLayer(heatLayer);

  if (heatData.length > 0) {
    heatLayer = L.heatLayer(heatData, {
      radius: 25,
      blur: 20,
      maxZoom: 10,
      gradient: { 0.2: '#3b82f6', 0.4: '#8b5cf6', 0.6: '#ec4899', 0.8: '#f59e0b', 1.0: '#f43f5e' },
    }).addTo(mapInstance);
  }

  // Add circle markers with tooltips
  // Clear old markers
  mapInstance.eachLayer(l => { if (l instanceof L.CircleMarker) mapInstance.removeLayer(l); });
  markers.forEach(m => {
    const marker = L.circleMarker(m.coords, {
      radius: Math.min(4 + m.count * 2, 20),
      color: 'var(--blue)',
      fillColor: '#3b82f6',
      fillOpacity: 0.6,
      weight: 1,
    }).bindTooltip(`<b>${m.name}</b><br>${m.count} orders<br>$${m.revenue.toFixed(2)}<br><i>Click to filter</i>`, { className: '' })
      .addTo(mapInstance);
    marker.on('click', () => {
      const citySelect = document.getElementById('filter-city');
      // Find matching option (case-insensitive)
      const match = [...citySelect.options].find(opt => opt.value.toLowerCase() === m.name.toLowerCase());
      if (match) {
        citySelect.value = match.value;
      } else {
        // Add it if not in dropdown
        const opt = document.createElement('option');
        opt.value = m.name;
        opt.textContent = m.name;
        citySelect.appendChild(opt);
        citySelect.value = m.name;
      }
      applyFilter();
    });
  });

  // Invalidate size in case container was hidden
  setTimeout(() => mapInstance.invalidateSize(), 200);
}

function sum(arr, key) { return arr.reduce((s, o) => s + Number(o[key] || 0), 0); }
function fmt_money(v) { return '$' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmt_date(d) { return d.toISOString().split('T')[0]; }

function topCustomer(orders, mode) {
  const customers = {};
  orders.forEach(o => {
    if (!o.email) return;
    if (!customers[o.email]) customers[o.email] = { name: o.customer_name || o.email, spend: 0, count: 0 };
    customers[o.email].spend += Number(o.total_value || 0);
    customers[o.email].count++;
  });
  const entries = Object.values(customers);
  if (entries.length === 0) return { name: '-', total: 0 };
  if (mode === 'count') {
    entries.sort((a, b) => b.count - a.count);
    return { name: entries[0].name, total: entries[0].count };
  }
  entries.sort((a, b) => b.spend - a.spend);
  return { name: entries[0].name, total: entries[0].spend };
}
