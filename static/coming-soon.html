<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSO — Coming Soon</title>
    <meta name="description" content="NZ's biggest retail disruption. Coming soon.">
    <meta property="og:title" content="OSO — NZ's biggest retail disruption, coming soon">
    <meta property="og:description" content="NZ's biggest retail disruption. Coming soon.">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0F0E0C;
            color: #FAF4EB;
            -webkit-font-smoothing: antialiased;
        }
        .wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, rgba(235, 199, 122, 0.08), transparent 60%);
            pointer-events: none;
        }
        .content {
            text-align: center;
            max-width: 720px;
            position: relative;
            z-index: 1;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 4rem;
            opacity: 0.6;
        }
        .eyebrow {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #EBC77A;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2.25rem, 6vw, 4.5rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }
        h1 em {
            font-style: italic;
            color: #EBC77A;
        }
        .sub {
            font-size: clamp(1rem, 1.5vw, 1.15rem);
            line-height: 1.6;
            opacity: 0.7;
            max-width: 520px;
            margin: 0 auto 3rem;
            font-weight: 300;
        }
        .coming-soon {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(235, 199, 122, 0.3);
            border-radius: 999px;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #EBC77A;
        }
        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #EBC77A;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        .footer {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            opacity: 0.3;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="content">
            <div class="logo">OSO</div>
            <div class="eyebrow">Something's brewing</div>
            <h1>NZ's biggest <em>retail disruption</em></h1>
            <p class="sub">A new model for how New Zealand buys and sells. Coming soon.</p>
            <div class="coming-soon">
                <span class="pulse"></span>
                <span>Coming Soon</span>
            </div>
        </div>
        <div class="footer">OSO.NZ</div>
    </div>
</body>
</html>
