[build]
  publish = "public"
  command = "hugo --minify"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."sales-alert"]
  schedule = "0 * * * *"

[functions."deploy-alert"]
  schedule = "*/15 * * * *"

[functions."traffic-alert"]
  schedule = "0 * * * *"

[functions."competitor-check"]
  schedule = "17 14 * * *"

[functions."merchant-alert"]
  schedule = "0 * * * *"

[functions."changelog-sync"]
  schedule = "*/15 * * * *"

[functions."changelog-followup"]
  schedule = "0 * * * *"

[functions."gmail-sync"]
  schedule = "7 */4 * * *"
