[build]
  publish = "public"
  # Build the CKF React app first so Hugo passes its bundle through static/.
  command = "cd ckf && npm ci && npm run build && cd .. && hugo --minify"

# Coming soon cover page — hides the anti-retail store pitch until launch
# Original homepage still accessible at /the-primalpantry-anti-retail-store.html
[[redirects]]
  from = "/"
  to = "/coming-soon.html"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Agent stages (creative pipeline + lifecycle jobs) call Anthropic with
# retry-once + Zod validation. Sonnet 4.6 finishes in 5-10s; bump to the
# max (26s) for occasional cold starts + retry rounds. The default 10s
# was the cause of Strategy stage 504s.
[functions."mktg-ads"]
  timeout = 26
[functions."mktg-vo"]
  timeout = 26

[functions."sales-alert"]
  schedule = "0 * * * *"

[functions."deploy-alert"]
  schedule = "*/15 * * * *"

[functions."traffic-alert"]
  schedule = "0 * * * *"

[functions."competitor-check"]
  schedule = "17 14 * * *"

[functions."merchant-alert"]
  schedule = "0 * * * *"

[functions."changelog-sync"]
  schedule = "*/15 * * * *"

[functions."changelog-followup"]
  schedule = "0 * * * *"

[functions."test-followup"]
  schedule = "43 * * * *"

[functions."gmail-sync"]
  schedule = "7 */4 * * *"

[functions."action-engine"]
  schedule = "0 18 * * *"
  timeout = 60

[functions."abandoned-cart-auto"]
  schedule = "0 5 * * *"

[functions."adspend-hourly-sync"]
  schedule = "23 * * * *"

[functions."website-insights"]
  schedule = "30 18 * * *"
  timeout = 60

# CKF Second Brain — diary reminder.
# UTC schedule fires twice (covers NZST UTC+12 and NZDT UTC+13).
# The handler hard-checks Pacific/Auckland local hour and only sends at 22:00 NZ
# (10pm — Curtis's deadline to log the evening reflection).
[functions."ckf-diary-reminder"]
  schedule = "0 9,10 * * *"

# CKF Whoop sync — pulls yesterday's recovery/sleep/strain. 19:00 UTC = 07/08 NZ.
[functions."ckf-whoop-sync"]
  schedule = "0 19 * * *"

# CKF errand reminders — checks every 5 min for due reminders, sends SMS.
[functions."ckf-reminder-sms"]
  schedule = "*/5 * * * *"

# CKF weekly summary auto-generate — Sunday 17:00 NZ.
# Cron fires on UTC 04:00 + 05:00 to cover NZST (UTC+12) and NZDT (UTC+13);
# the handler hard-checks Pacific/Auckland weekday + hour.
[functions."ckf-weekly-cron"]
  schedule = "0 4,5 * * 0"

# CKF streak nudge — 20:00 NZ. SMS if any checkbox goal hasn't been ticked today.
[functions."ckf-streak-nudge"]
  schedule = "0 7,8 * * *"

# CKF 90-day-goal review nudge — 09:00 NZ on the day a 90-day goal ends
# (with a 7-day catch-up window). Sends SMS + auto-creates a business_task
# so the review surfaces in the Today/Jobs strip on the morning view.
[functions."ckf-ninety-day-nudge"]
  schedule = "0 20,21 * * *"

# ── Creative-agent lifecycle jobs (Block 6) ─────────────────────────────────
# Each job has a threshold gate inside the function -- the cron is a max
# cadence. Schedules in UTC; daily jobs picked off-peak NZ for cheap retries.

# Daily 03:00 / 03:30 NZST -- pattern + pain-point re-extraction (threshold gated)
[functions."mktg-job-playbook-extract"]
  schedule = "0 15 * * *"
[functions."mktg-job-pain-point-extract"]
  schedule = "30 15 * * *"

# Weekly Sunday -- anti-pattern + retention-drop detection (no agent calls)
[functions."mktg-job-anti-pattern-detect"]
  schedule = "0 16 * * 0"
[functions."mktg-job-retention-drop-detect"]
  schedule = "30 16 * * 0"

# Every 25 new performed records -- taste vs perf audit (threshold gated daily)
[functions."mktg-job-taste-vs-perf"]
  schedule = "45 15 * * *"

# Monthly -- self-audit (1st at 04:00 NZST = 16:00 UTC prev day)
[functions."mktg-job-self-audit"]
  schedule = "0 16 1 * *"

# Quarterly -- stat freshness (1st of Jan/Apr/Jul/Oct at 09:00 NZST)
[functions."mktg-job-stat-freshness"]
  schedule = "0 21 1 1,4,7,10 *"

# ── CKF SPA: any /ckf/* request that isn't a real file falls back to /ckf/index.html ──
[[redirects]]
  from = "/ckf/*"
  to = "/ckf/index.html"
  status = 200

# ── CKF static asset cache ──
[[headers]]
  for = "/ckf/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache headers for dashboard static assets ──
[[headers]]
  for = "/primalpantry/dashboard.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/primalpantry/dashboard.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/primalpantry/claude-chat.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
