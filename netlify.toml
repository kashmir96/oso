[build]
  publish = "public"
  command = "hugo --minify"

# Make anti-retail store the homepage; keep Curtis's personal page at /curtis
[[redirects]]
  from = "/"
  to = "/the-primalpantry-anti-retail-store.html"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."sales-alert"]
  schedule = "0 * * * *"

[functions."deploy-alert"]
  schedule = "*/15 * * * *"

[functions."traffic-alert"]
  schedule = "0 * * * *"

[functions."competitor-check"]
  schedule = "17 14 * * *"

[functions."merchant-alert"]
  schedule = "0 * * * *"

[functions."changelog-sync"]
  schedule = "*/15 * * * *"

[functions."changelog-followup"]
  schedule = "0 * * * *"

[functions."test-followup"]
  schedule = "43 * * * *"

[functions."gmail-sync"]
  schedule = "7 */4 * * *"

[functions."action-engine"]
  schedule = "0 18 * * *"
  timeout = 60

[functions."abandoned-cart-auto"]
  schedule = "0 5 * * *"

[functions."adspend-hourly-sync"]
  schedule = "23 * * * *"

[functions."website-insights"]
  schedule = "30 18 * * *"
  timeout = 60

# ── Cache headers for dashboard static assets ──
[[headers]]
  for = "/primalpantry/dashboard.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/primalpantry/dashboard.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/primalpantry/claude-chat.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
